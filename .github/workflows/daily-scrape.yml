name: Daily arXiv scrape

on:
  schedule:
    # arXiv announces new papers at ~8 PM ET on weekdays.
    # All times below are UTC; ET = UTC-5 (EST) / UTC-4 (EDT).
    # The discussed sync runs earlier in the morning so this scrape can annotate
    # papers directly from data/discussed.json, the same way local authors are
    # annotated during scraping.
    #
    # Hourly 9 PM–midnight ET, Sun–Thu nights:
    #   9 PM ET  = 02:00 UTC next day
    - cron: "0 2 * * 1-5"
    #   midnight = 05:00 UTC next day
    - cron: "0 5 * * 1-5"
    # 6 AM ET Mon–Fri = 11:00 UTC Mon–Fri
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.SCRAPER_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update arXiv data $(date -u +%Y-%m-%d)"
            git push
          fi
