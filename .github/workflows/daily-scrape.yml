name: Daily arXiv scrape

on:
  schedule:
    # arXiv announces new papers at ~8 PM ET on weekdays.
    # All times below are UTC; ET = UTC-5 (EST) / UTC-4 (EDT).
    #
    # Hourly 9 PM–midnight ET, Sun–Thu nights:
    #   9 PM ET  = 02:00 UTC next day  (Sun night → Mon UTC, …, Thu night → Fri UTC)
    #   10 PM ET = 03:00 UTC next day
    #   11 PM ET = 04:00 UTC next day
    #   midnight = 05:00 UTC next day
    - cron: "0 2,3,4,5 * * 1-5"
    # 6 AM ET Mon–Fri = 11:00 UTC Mon–Fri
    - cron: "0 11 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to scrape (YYYY-MM-DD). Leave empty for default (yesterday ET)."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            python scripts/scrape.py "$DATE_ARG"
          else
            python scripts/scrape.py
          fi

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update arXiv data $(date -u +%Y-%m-%d)"
            git push
          fi
