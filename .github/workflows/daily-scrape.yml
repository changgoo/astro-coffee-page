name: Daily arXiv scrape

on:
  schedule:
    # GitHub Actions supports timezone-aware schedules. These run in New York
    # local time and intentionally avoid the top of the hour.
    # The discussed sync runs earlier in the morning so this scrape can annotate
    # papers directly from data/discussed.json, the same way local authors are
    # annotated during scraping.
    - cron: "17 21 * * 0-4"
      timezone: "America/New_York"
    - cron: "17 1,5,9 * * 1-5"
      timezone: "America/New_York"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.SCRAPER_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update arXiv data $(date -u +%Y-%m-%d)"
            git push
          fi
