name: Daily arXiv scrape

on:
  schedule:
    # 15:30 UTC = ~10:30 AM ET, well after arXiv's 14:00 ET submission cutoff
    # Runs Mon–Fri only (arXiv doesn't post on weekends)
    - cron: "30 15 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to scrape (YYYY-MM-DD). Leave empty for default (yesterday ET)."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper
        run: |
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            python scripts/scrape.py "$DATE_ARG"
          else
            python scripts/scrape.py
          fi

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update arXiv data $(date -u +%Y-%m-%d)"
            git push
          fi
