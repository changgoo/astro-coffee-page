name: Unit tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest ruff

      - name: Lint
        run: ruff check scripts/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v
