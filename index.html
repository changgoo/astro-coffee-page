<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>astro-ph Coffee Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <a href="https://web.astro.princeton.edu/" target="_blank" rel="noopener"
     class="header-shield" title="Princeton Astrophysical Sciences">
    <img src="https://www.princeton.edu/favicon.ico"
         height="32" alt="Princeton shield">
  </a>

  <h1><a href="index.html">astro-ph ☕</a></h1>

  <div class="header-controls">
    <button id="btn-prev" class="btn-nav" title="Older">&#8592; Older</button>
    <select id="date-select" aria-label="Select date"></select>
    <button id="btn-next" class="btn-nav" title="Newer">Newer &#8594;</button>
    <span id="fetched-at" class="fetched-at"></span>
  </div>

  <a href="https://changgoo.github.io/AstroCoffee/intro.html"
     target="_blank" rel="noopener" class="header-center-link">
    AstroCoffee&nbsp;&#128197;
  </a>

  <nav class="header-links">
    <a id="arxiv-day-link" href="https://arxiv.org/list/astro-ph/new"
       target="_blank" rel="noopener" title="arXiv listing for this date" aria-label="arXiv">
      <img src="https://arxiv.org/favicon.ico" width="22" height="22" alt="arXiv">
    </a>
    <a href="https://github.com/changgoo/astro-coffee-page"
       target="_blank" rel="noopener" title="GitHub repository" aria-label="GitHub">
      <svg viewBox="0 0 16 16" width="22" height="22" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </nav>
</header>

<main>
  <div id="toolbar">
    <label for="sort-select">Sort:</label>
    <select id="sort-select">
      <option value="local" selected>Local authors first</option>
      <option value="default">Default (arXiv order)</option>
      <option value="author">First author A–Z</option>
      <option value="title">Title A–Z</option>
      <option value="category">Category</option>
    </select>
  </div>

  <div id="cat-filter">
    <span>Filter:</span>
    <!-- category toggle buttons injected by app.js -->
  </div>

  <div id="stats"></div>
  <div id="loading">Loading…</div>
  <div id="paper-list"></div>
</main>

<footer>
  <p>
    Daily arXiv astro-ph listings &mdash;
    <a href="https://arxiv.org/list/astro-ph/new" target="_blank" rel="noopener">arxiv.org</a>.
    Thank you to arXiv for use of its open access interoperability.
  </p>
</footer>

<script src="app.js"></script>
</body>
</html>
